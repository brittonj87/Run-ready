<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F4E8C"/>
      <stop offset="100%" stop-color="#14315C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#g)"/>
  <g stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" fill="none">
    <!-- torso -->
    <line x1="230" y1="180" x2="240" y2="300"/>
    <!-- head -->
    <circle cx="222" cy="140" r="34" fill="none"/>
    <!-- reaching arm overhead -->
    <line x1="230" y1="195" x2="300" y2="150"/>
    <line x1="300" y1="150" x2="335" y2="95"/>
    <!-- other arm on hip -->
    <line x1="235" y1="215" x2="195" y2="235"/>
    <line x1="195" y1="235" x2="190" y2="270"/>
    <!-- standing leg -->
    <line x1="240" y1="300" x2="230" y2="380"/>
    <line x1="230" y1="380" x2="215" y2="430"/>
    <!-- lifted/bent leg (stretch pose) -->
    <line x1="240" y1="300" x2="300" y2="330"/>
    <line x1="300" y1="330" x2="290" y2="270"/>
  </g>
  <circle cx="380" cy="380" r="10" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="405" cy="360" r="6" fill="#FFFFFF" opacity="0.5"/>
</svg>
